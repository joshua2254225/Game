<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hextris Game</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial;
    overflow: hidden;
}

/* BANNER (TOP + BOTTOM) */
.banner {
    position: fixed;
    width: 100%;
    height: 60px;
    background: #222;
    color: white;
    text-align: center;
    line-height: 60px;
    z-index: 20;
}

#topBanner { top: 0; }
#bottomBanner { bottom: 0; }

/* START SCREEN */
#startScreen {
    position: fixed;
    top: 60px;
    bottom: 60px;
    width: 100%;
    background: radial-gradient(circle, #111, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

h1 {
    color: white;
    font-size: 40px;
    margin-bottom: 20px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    background: cyan;
}

/* GAME FRAME */
#gameFrame {
    position: fixed;
    top: 60px;
    bottom: 60px;
    width: 100%;
    border: none;
    display: none;
}

/* EXIT BUTTON */
#exitBtn {
    position: fixed;
    top: 70px;
    right: 10px;
    z-index: 30;
    display: none;
    background: red;
    color: white;
}
</style>
</head>

<body>

<!-- TOP BANNER -->
<div id="topBanner" class="banner">
    TOP AD BANNER
</div>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>HEXTRIS</h1>
    <button onclick="startGame()">▶ Start Game</button>
</div>

<!-- EXIT BUTTON -->
<button id="exitBtn" onclick="exitGame()">✖ Exit</button>

<!-- GAME -->
<iframe 
    id="gameFrame"
    src="https://hextris.github.io/hextris/">
</iframe>

<!-- GPL NOTICE -->
<p style="position:fixed; bottom:70px; width:100%; text-align:center; color:white; font-size:12px; z-index:25;">
This game is based on Hextris (GPL v3) –
<a href="https://github.com/Hextris/hextris" style="color:cyan;">Source</a>
</p>

<!-- BOTTOM BANNER -->
<div id="bottomBanner" class="banner">
    BOTTOM AD BANNER
</div>

<script>
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameFrame").style.display = "block";
    document.getElementById("exitBtn").style.display = "block";
}

function exitGame() {
    document.getElementById("startScreen").style.display = "flex";
    document.getElementById("gameFrame").style.display = "none";
    document.getElementById("exitBtn").style.display = "none";
}
</script>

</body>
</html>
