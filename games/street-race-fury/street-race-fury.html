<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Street Race Fury</title>

<style>
:root {
    --bg: #0f0f12;
    --panel: rgba(24,24,28,0.96);
    --text: #f4f7fb;
    --muted: #a7afbd;
    --accent: #ff3d00;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: Arial, sans-serif;
    color: var(--text);
}

/* TOP BAR */
#topBar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--panel);
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    align-items: center;
    z-index: 50;
    backdrop-filter: blur(10px);
}

#title {
    text-align: center;
    font-weight: 700;
    letter-spacing: 1.2px;
}

.btn {
    width: 40px;
    height: 40px;
    margin: auto;
    border: 0;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    cursor: pointer;
}

/* GAME AREA */
#gameArea {
    position: fixed;
    top: 60px;
    bottom: 64px;
    left: 0;
    right: 0;
    background: black;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(circle at top, rgba(255,61,0,0.18), transparent 50%),
                rgba(0,0,0,0.95);
}

.card {
    width: min(90vw, 420px);
    padding: 24px;
    border-radius: 18px;
    background: rgba(20,20,28,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
}

.card h1 {
    margin: 0 0 10px;
}

.card p {
    color: var(--muted);
    font-size: 14px;
}

#startBtn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    border: 0;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #ff3d00, #ff9100);
    color: #0b0f12;
}

/* LOADING */
#loadingScreen {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.96);
}

.spinner {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 5px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* BOTTOM */
#bottomBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--panel);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
}
</style>
</head>

<body>

<header id="topBar">
    <button class="btn" onclick="closeGame()">✕</button>
    <div id="title">STREET RACE FURY</div>
    <button class="btn" onclick="reloadGame()">↻</button>
</header>

<main id="gameArea">

    <iframe id="gameFrame"></iframe>

    <!-- START -->
    <div id="startScreen">
        <div class="card">
            <h1>Street Race Fury</h1>
            <p>Drücke Start um das Racing Game zu laden.</p>
            <button id="startBtn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p style="color:#a7afbd;margin-top:14px;">Loading race...</p>
    </div>

</main>

<footer id="bottomBar">
    Arcade Engine
</footer>

<script>

const GAME = {
    title: "Street Race Fury",
    url: "https://html5gameshq.com/iframed/streetrace-fury"
};

const frame = document.getElementById("gameFrame");
const startScreen = document.getElementById("startScreen");
const loadingScreen = document.getElementById("loadingScreen");

let started = false;

function startGame() {
    if (started) return;
    started = true;

    startScreen.style.display = "none";
    loadingScreen.style.display = "flex";

    frame.src = GAME.url;
    frame.style.display = "block";
}

frame.addEventListener("load", () => {
    loadingScreen.style.display = "none";
});

function reloadGame() {
    location.reload();
}

function closeGame() {
    window.location.href = "https://arcadeowl.vercel.app/";
}

</script>

</body>
  </html>
