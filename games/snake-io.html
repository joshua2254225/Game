<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SNAKE.IO — NEON ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-green: #00ff88;
    --neon-cyan: #00f0ff;
    --neon-gold: #ffd700;
    --neon-red: #ff2244;
    --neon-purple: #bf00ff;
    --bg-dark: #020810;
    --bg-panel: #050f1a;
    --border-glow: rgba(0,255,136,0.4);
    --grid-color: rgba(0,255,136,0.05);
    --stone-color: #5a5a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    font-family: 'Orbitron', monospace;
    color: var(--neon-green);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(191,0,255,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HUD ── */
  #hud {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 6px;
    gap: 8px;
  }

  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 10px;
    padding: 6px 18px;
    min-width: 110px;
    backdrop-filter: blur(4px);
  }

  .score-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,255,136,0.5);
    text-transform: uppercase;
  }

  .score-value {
    font-size: 26px;
    font-weight: 900;
    color: var(--neon-green);
    text-shadow: 0 0 12px var(--neon-green), 0 0 30px rgba(0,255,136,0.4);
    line-height: 1.1;
  }

  .score-box.high .score-value {
    color: var(--neon-gold);
    text-shadow: 0 0 12px var(--neon-gold), 0 0 30px rgba(255,215,0,0.4);
  }

  #title-badge {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    text-align: center;
    white-space: nowrap;
  }
  #title-badge span { display: block; font-size: 7px; letter-spacing: 2px; color: rgba(0,240,255,0.4); margin-top: 2px; }

  /* ── GAME WRAPPER ── */
  #game-wrap {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    flex: 1;
  }

  #canvas-container {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px rgba(0,255,136,0.3),
      0 0 20px rgba(0,255,136,0.15),
      0 0 60px rgba(0,255,136,0.05);
    transition: transform 0.05s;
  }

  #canvas-container.shake {
    animation: screenShake 0.4s ease;
  }

  @keyframes screenShake {
    0%   { transform: translate(0,0) rotate(0); }
    15%  { transform: translate(-6px,4px) rotate(-1deg); }
    30%  { transform: translate(6px,-4px) rotate(1deg); }
    45%  { transform: translate(-4px,4px) rotate(0.5deg); }
    60%  { transform: translate(4px,-2px) rotate(-0.5deg); }
    75%  { transform: translate(-2px,2px) rotate(0); }
    100% { transform: translate(0,0) rotate(0); }
  }

  canvas { display: block; }

  /* ── OVERLAY ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2,8,16,0.88);
    backdrop-filter: blur(6px);
    z-index: 20;
    gap: 18px;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    filter: drop-shadow(0 0 16px rgba(0,255,136,0.5));
  }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(0,240,255,0.6);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.8;
  }

  .play-btn {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--bg-dark);
    background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(0,255,136,0.5), 0 0 50px rgba(0,255,136,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
    outline: none;
  }

  .play-btn:hover, .play-btn:active {
    transform: scale(1.06);
    box-shadow: 0 0 34px rgba(0,255,136,0.8), 0 0 70px rgba(0,255,136,0.3);
  }

  .death-info {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--neon-red);
    letter-spacing: 2px;
    text-align: center;
  }

  .final-score-wrap {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
  }

  .final-score {
    text-align: center;
  }

  .final-score .label {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,255,136,0.5);
  }

  .final-score .val {
    font-size: 28px;
    font-weight: 900;
    color: var(--neon-green);
    text-shadow: 0 0 14px var(--neon-green);
  }

  .final-score.hi .val {
    color: var(--neon-gold);
    text-shadow: 0 0 14px var(--neon-gold);
  }

  .new-record {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--neon-gold);
    text-shadow: 0 0 8px var(--neon-gold);
    animation: pulse 0.8s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* ── JOYSTICK ── */
  #joystick-area {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0 8px;
    width: 100%;
  }

  #joystick-base {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, rgba(0,255,136,0.02) 60%, transparent 100%);
    border: 2px solid rgba(0,255,136,0.25);
    box-shadow: 0 0 20px rgba(0,255,136,0.1), inset 0 0 20px rgba(0,0,0,0.4);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  #joystick-base::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.1);
  }

  /* Directional arrows on the base */
  #joystick-base::after {
    content: '▲ ▼ ◀ ▶';
    font-size: 8px;
    color: rgba(0,255,136,0.2);
    letter-spacing: 6px;
    display: none;
  }

  .joy-arrow {
    position: absolute;
    color: rgba(0,255,136,0.2);
    font-size: 10px;
    pointer-events: none;
  }
  .joy-arrow.up    { top: 10px; left: 50%; transform: translateX(-50%); }
  .joy-arrow.down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .joy-arrow.left  { left: 10px; top: 50%; transform: translateY(-50%); }
  .joy-arrow.right { right: 10px; top: 50%; transform: translateY(-50%); }

  #joystick-knob {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(0,255,136,0.8), rgba(0,200,80,0.5));
    border: 2px solid rgba(0,255,136,0.6);
    box-shadow:
      0 0 16px rgba(0,255,136,0.5),
      0 0 32px rgba(0,255,136,0.2),
      inset 0 2px 4px rgba(255,255,255,0.2),
      inset 0 -2px 4px rgba(0,0,0,0.3);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: box-shadow 0.1s;
    pointer-events: none;
  }

  #joystick-knob.active {
    box-shadow:
      0 0 24px rgba(0,255,136,0.8),
      0 0 50px rgba(0,255,136,0.4),
      inset 0 2px 4px rgba(255,255,255,0.2);
  }

  /* ── KEYBOARD HINT ── */
  #keyboard-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(0,255,136,0.2);
    text-align: center;
    padding-bottom: 6px;
  }

  /* ── LEGEND ── */
  #legend {
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
    padding: 4px 0 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(0,255,136,0.3);
    letter-spacing: 1px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* coin timer badges */
  .coin-timer {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--neon-gold);
    text-shadow: 0 0 6px var(--neon-gold);
    pointer-events: none;
    z-index: 30;
  }

  @media (max-height: 680px) {
    .overlay-title { font-size: 26px; }
    #joystick-base { width: 110px; height: 110px; }
    #joystick-knob { width: 44px; height: 44px; }
    .score-value { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div id="title-badge">SNAKE.IO<span>NEON ARENA</span></div>
  <div class="score-box high">
    <div class="score-label">Best</div>
    <div class="score-value" id="highscore-display">0</div>
  </div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>

    <!-- START OVERLAY -->
    <div class="overlay" id="start-overlay">
      <div class="overlay-title">SNAKE.IO</div>
      <div class="overlay-sub">
        COLLECT COINS — AVOID STONES<br>
        DON'T HIT THE WALLS
      </div>
      <button class="play-btn" id="start-btn">▶ START GAME</button>
      <div class="overlay-sub" style="font-size:10px; opacity:0.5;">ARROW KEYS / WASD / JOYSTICK</div>
    </div>

    <!-- DEATH OVERLAY -->
    <div class="overlay hidden" id="death-overlay">
      <div class="overlay-title" style="font-size:28px; background: linear-gradient(135deg,#ff2244,#ff8800); -webkit-background-clip:text; background-clip:text;">GAME OVER</div>
      <div class="death-info" id="death-reason">YOU HIT A WALL</div>
      <div class="final-score-wrap">
        <div class="final-score">
          <div class="label">SCORE</div>
          <div class="val" id="final-score-val">0</div>
        </div>
        <div class="final-score hi">
          <div class="label">BEST</div>
          <div class="val" id="final-hi-val">0</div>
        </div>
      </div>
      <div class="new-record hidden" id="new-record-badge">⭐ NEW RECORD ⭐</div>
      <button class="play-btn" id="restart-btn">↺ PLAY AGAIN</button>
    </div>
  </div>

  <!-- LEGEND -->
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00ff88;box-shadow:0 0 6px #00ff88;"></div>SNAKE</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700;box-shadow:0 0 6px #ffd700; border-radius:50%;"></div>COIN (+1)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6a6a7a;box-shadow:0 0 4px #333;"></div>STONE</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff2244;box-shadow:0 0 6px #ff2244; width:20px; border-radius:2px;"></div>BORDER</div>
  </div>
</div>

<!-- JOYSTICK -->
<div id="joystick-area">
  <div id="joystick-base">
    <span class="joy-arrow up">▲</span>
    <span class="joy-arrow down">▼</span>
    <span class="joy-arrow left">◀</span>
    <span class="joy-arrow right">▶</span>
    <div id="joystick-knob"></div>
  </div>
</div>

<div id="keyboard-hint">KEYBOARD: ARROW KEYS / W A S D</div>

<script>
/* ═══════════════════════════════════════════════
   SNAKE.IO — NEON ARENA
   Full game implementation
═══════════════════════════════════════════════ */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const canvasContainer = document.getElementById('canvas-container');

// ── SIZING ──
const CELL = 20;
let COLS, ROWS, W, H;

function resize() {
  const maxW = Math.min(window.innerWidth - 8, 600);
  const availH = window.innerHeight - 200;
  const maxH = Math.min(availH, 480);
  COLS = Math.floor(maxW / CELL);
  ROWS = Math.floor(maxH / CELL);
  W = COLS * CELL;
  H = ROWS * CELL;
  canvas.width = W;
  canvas.height = H;
  canvasContainer.style.width = W + 'px';
  canvasContainer.style.height = H + 'px';
}
resize();

// ── STATE ──
let snake, dir, nextDir, score, highScore, gameRunning, gameOver;
let coins = [], stones = [], particles = [];
let coinTimers = {}; // coinId -> {x,y,timeLeft}
let coinIdCounter = 0;
let frameCount = 0;
let lastTime = 0;
let animId;
const TICK_INTERVAL = 100; // ms per step
let accumulator = 0;
let flashOverlay = 0; // 0-1 for red flash
let deathReason = '';

// ── HIGH SCORE ──
highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
document.getElementById('highscore-display').textContent = highScore;

// ── STONE PATTERNS ──
const STONE_SHAPES = [
  // clusters of 1-4 cells
  [{x:0,y:0}],
  [{x:0,y:0},{x:1,y:0}],
  [{x:0,y:0},{x:0,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:0,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:1,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0}],
];

function initGame() {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  coins = [];
  stones = [];
  particles = [];
  coinTimers = {};
  coinIdCounter = 0;
  flashOverlay = 0;
  accumulator = 0;
  updateScoreDisplay();

  // Place stones (avoid center)
  const numStones = Math.min(12, Math.floor(COLS * ROWS / 50));
  for (let i = 0; i < numStones; i++) {
    placeStone();
  }

  // Place initial coins
  for (let i = 0; i < 6; i++) {
    spawnCoin();
  }

  gameRunning = true;
  gameOver = false;
}

function isCellOccupied(x, y, checkSnake = true) {
  if (x <= 0 || y <= 0 || x >= COLS - 1 || y >= ROWS - 1) return true;
  if (checkSnake && snake.some(s => s.x === x && s.y === y)) return true;
  if (stones.some(s => s.x === x && s.y === y)) return true;
  if (coins.some(c => c.x === x && c.y === y)) return true;
  return false;
}

function placeStone() {
  const shape = STONE_SHAPES[Math.floor(Math.random() * STONE_SHAPES.length)];
  // Try up to 30 times to find a valid position
  for (let attempt = 0; attempt < 30; attempt++) {
    const bx = 2 + Math.floor(Math.random() * (COLS - 4));
    const by = 2 + Math.floor(Math.random() * (ROWS - 4));
    // Avoid center area
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    if (Math.abs(bx - cx) < 5 && Math.abs(by - cy) < 4) continue;
    const cells = shape.map(s => ({ x: bx + s.x, y: by + s.y }));
    if (cells.every(c => !isCellOccupied(c.x, c.y, false) && c.x > 0 && c.y > 0 && c.x < COLS - 1 && c.y < ROWS - 1)) {
      cells.forEach(c => stones.push({ x: c.x, y: c.y }));
      return;
    }
  }
}

function spawnCoin(fromTimer = false) {
  for (let attempt = 0; attempt < 100; attempt++) {
    const x = 1 + Math.floor(Math.random() * (COLS - 2));
    const y = 1 + Math.floor(Math.random() * (ROWS - 2));
    if (!isCellOccupied(x, y)) {
      const id = coinIdCounter++;
      coins.push({ x, y, id, pulse: Math.random() * Math.PI * 2 });
      return;
    }
  }
}

// ── GAME STEP ──
function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x <= 0 || head.y <= 0 || head.x >= COLS - 1 || head.y >= ROWS - 1) {
    triggerDeath('YOU CRASHED INTO THE BORDER');
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    triggerDeath('YOU BIT YOUR OWN TAIL');
    return;
  }

  // Stone collision
  if (stones.some(s => s.x === head.x && s.y === head.y)) {
    triggerDeath('YOU HIT A STONE OBSTACLE');
    return;
  }

  snake.unshift(head);

  // Coin collection
  const coinIdx = coins.findIndex(c => c.x === head.x && c.y === head.y);
  if (coinIdx !== -1) {
    const coin = coins[coinIdx];
    coins.splice(coinIdx, 1);
    score++;
    updateScoreDisplay();
    spawnParticles(head.x * CELL + CELL / 2, head.y * CELL + CELL / 2, '#ffd700', 12);
    // Schedule respawn
    coinTimers[coin.id] = { timeLeft: 100, x: coin.x, y: coin.y }; // 100 ticks = ~10s
    setTimeout(() => spawnCoin(true), 10000);
  } else {
    snake.pop();
  }

  // Tick coin timers
  Object.keys(coinTimers).forEach(id => {
    coinTimers[id].timeLeft--;
    if (coinTimers[id].timeLeft <= 0) delete coinTimers[id];
  });
}

function triggerDeath(reason) {
  gameRunning = false;
  gameOver = true;
  deathReason = reason;
  flashOverlay = 1;

  // Screen shake
  canvasContainer.classList.remove('shake');
  void canvasContainer.offsetWidth;
  canvasContainer.classList.add('shake');

  // Explode snake
  snake.forEach((seg, i) => {
    setTimeout(() => {
      spawnParticles(seg.x * CELL + CELL / 2, seg.y * CELL + CELL / 2, i === 0 ? '#ff2244' : '#00ff88', 6);
    }, i * 15);
  });

  // Update high score
  let isNewRecord = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    isNewRecord = true;
  }

  setTimeout(showDeathScreen, 700);
}

function showDeathScreen() {
  document.getElementById('death-reason').textContent = deathReason;
  document.getElementById('final-score-val').textContent = score;
  document.getElementById('final-hi-val').textContent = highScore;
  const badge = document.getElementById('new-record-badge');
  if (score >= highScore && score > 0) {
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
  document.getElementById('death-overlay').classList.remove('hidden');
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('highscore-display').textContent = highScore;
}

// ── PARTICLES ──
function spawnParticles(px, py, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color,
    });
  }
}

// ── DRAW ──
function draw(ts) {
  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
  }

  // Border wall (1 cell wide danger zone)
  drawBorder();

  // Stones
  drawStones();

  // Coins
  drawCoins(ts);

  // Snake
  if (snake && snake.length) drawSnake(ts);

  // Particles
  drawParticles();

  // Flash overlay
  if (flashOverlay > 0) {
    ctx.fillStyle = `rgba(255,34,68,${flashOverlay * 0.4})`;
    ctx.fillRect(0, 0, W, H);
    flashOverlay -= 0.04;
  }
}

function drawBorder() {
  const b = CELL;
  // Animated danger border
  const t = Date.now() / 1000;
  const alpha = 0.5 + 0.3 * Math.sin(t * 3);

  // Fill border cells with red glow
  ctx.fillStyle = `rgba(255,34,68,${0.12 + 0.05 * Math.sin(t * 2)})`;
  ctx.fillRect(0, 0, W, b); // top
  ctx.fillRect(0, H - b, W, b); // bottom
  ctx.fillRect(0, 0, b, H); // left
  ctx.fillRect(W - b, 0, b, H); // right

  // Inner border line (the actual wall)
  ctx.strokeStyle = `rgba(255,34,68,${alpha})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff2244';
  ctx.shadowBlur = 8;
  ctx.strokeRect(b, b, W - b * 2, H - b * 2);
  ctx.shadowBlur = 0;

  // Warning stripes
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < COLS; i++) {
    if (i % 2 === 0) {
      ctx.fillStyle = '#ff2244';
      ctx.fillRect(i * CELL, 0, CELL, CELL);
      ctx.fillRect(i * CELL, H - CELL, CELL, CELL);
    }
  }
  for (let j = 1; j < ROWS - 1; j++) {
    if (j % 2 === 0) {
      ctx.fillStyle = '#ff2244';
      ctx.fillRect(0, j * CELL, CELL, CELL);
      ctx.fillRect(W - CELL, j * CELL, CELL, CELL);
    }
  }
  ctx.restore();

  // "DANGER" corner markers
  ctx.fillStyle = `rgba(255,34,68,${alpha})`;
  ctx.font = '7px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ['DANGER', 'DANGER', 'DANGER', 'DANGER'].forEach((txt, i) => {
    ctx.save();
    let tx = CELL / 2, ty = CELL / 2;
    if (i === 1) { tx = W - CELL / 2; }
    if (i === 2) { tx = CELL / 2; ty = H - CELL / 2; }
    if (i === 3) { tx = W - CELL / 2; ty = H - CELL / 2; }
    ctx.fillText('⚠', tx, ty);
    ctx.restore();
  });
}

function drawStones() {
  stones.forEach(s => {
    const px = s.x * CELL;
    const py = s.y * CELL;

    // Stone gradient
    const grad = ctx.createRadialGradient(px + CELL * 0.35, py + CELL * 0.35, 1, px + CELL / 2, py + CELL / 2, CELL * 0.7);
    grad.addColorStop(0, '#8a8a9a');
    grad.addColorStop(0.5, '#5a5a6a');
    grad.addColorStop(1, '#30303a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    // Slightly rounded
    roundRect(ctx, px + 1, py + 1, CELL - 2, CELL - 2, 3);
    ctx.fill();

    // Stone crack detail
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + 5, py + 6); ctx.lineTo(px + 10, py + 11);
    ctx.moveTo(px + 10, py + 5); ctx.lineTo(px + 7, py + 9);
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(px + CELL * 0.35, py + CELL * 0.3, 4, 3, -0.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawCoins(ts) {
  const t = ts / 1000;
  coins.forEach(coin => {
    coin.pulse = (coin.pulse || 0) + 0.05;
    const px = coin.x * CELL + CELL / 2;
    const py = coin.y * CELL + CELL / 2;
    const bobY = Math.sin(t * 2 + coin.pulse) * 1.5;
    const scale = 0.9 + 0.1 * Math.sin(t * 3 + coin.pulse);
    const r = (CELL / 2 - 3) * scale;

    // Glow
    ctx.save();
    const glowGrad = ctx.createRadialGradient(px, py + bobY, 0, px, py + bobY, r * 2.5);
    glowGrad.addColorStop(0, 'rgba(255,215,0,0.25)');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(px, py + bobY, r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Coin body
    const coinGrad = ctx.createRadialGradient(px - r * 0.3, py + bobY - r * 0.3, 0, px, py + bobY, r);
    coinGrad.addColorStop(0, '#fff7a0');
    coinGrad.addColorStop(0.4, '#ffd700');
    coinGrad.addColorStop(1, '#b8860b');
    ctx.fillStyle = coinGrad;
    ctx.beginPath();
    ctx.arc(px, py + bobY, r, 0, Math.PI * 2);
    ctx.fill();

    // $ symbol
    ctx.fillStyle = 'rgba(100,60,0,0.6)';
    ctx.font = `bold ${CELL * 0.45}px Share Tech Mono`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', px, py + bobY + 0.5);

    ctx.restore();
  });
}

function drawSnake(ts) {
  const t = ts / 1000;
  snake.forEach((seg, i) => {
    const px = seg.x * CELL;
    const py = seg.y * CELL;
    const isHead = i === 0;
    const progress = i / snake.length; // 0=head, 1=tail

    const segColor = isHead ? '#00ffaa' : `hsl(${140 + progress * 20}, 100%, ${55 - progress * 15}%)`;
    const glowIntensity = isHead ? 1 : (1 - progress * 0.6);

    // Glow
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = isHead ? 16 : 8 * glowIntensity;

    const grad = ctx.createLinearGradient(px, py, px + CELL, py + CELL);
    if (isHead) {
      grad.addColorStop(0, '#00ffcc');
      grad.addColorStop(1, '#00dd77');
    } else {
      grad.addColorStop(0, `hsl(${140 + progress * 20}, 100%, ${55 - progress * 10}%)`);
      grad.addColorStop(1, `hsl(${140 + progress * 25}, 90%, ${40 - progress * 10}%)`);
    }

    ctx.fillStyle = grad;
    ctx.beginPath();
    roundRect(ctx, px + 1, py + 1, CELL - 2, CELL - 2, isHead ? 6 : 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Head details: eyes
    if (isHead) {
      const ex = CELL * 0.25, ey = CELL * 0.3;
      // Eyes based on direction
      let eye1x, eye1y, eye2x, eye2y;
      if (dir.x === 1) { eye1x = CELL * 0.7; eye1y = CELL * 0.25; eye2x = CELL * 0.7; eye2y = CELL * 0.65; }
      else if (dir.x === -1) { eye1x = CELL * 0.3; eye1y = CELL * 0.25; eye2x = CELL * 0.3; eye2y = CELL * 0.65; }
      else if (dir.y === -1) { eye1x = CELL * 0.25; eye1y = CELL * 0.3; eye2x = CELL * 0.65; eye2y = CELL * 0.3; }
      else { eye1x = CELL * 0.25; eye1y = CELL * 0.65; eye2x = CELL * 0.65; eye2y = CELL * 0.65; }

      ctx.fillStyle = '#002210';
      ctx.beginPath(); ctx.arc(px + eye1x, py + eye1y, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + eye2x, py + eye2y, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(px + eye1x + 1, py + eye1y - 1, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + eye2x + 1, py + eye2y - 1, 1, 0, Math.PI * 2); ctx.fill();

      // Tongue flicker
      const tongueFlick = Math.sin(t * 8) > 0;
      if (tongueFlick) {
        ctx.strokeStyle = '#ff4466';
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        let tx1 = px + CELL / 2, ty1 = py + CELL / 2;
        let tx2 = tx1, ty2 = ty1;
        if (dir.x === 1) { tx2 += CELL * 0.6; }
        else if (dir.x === -1) { tx2 -= CELL * 0.6; }
        else if (dir.y === 1) { ty2 += CELL * 0.6; }
        else { ty2 -= CELL * 0.6; }
        ctx.moveTo(tx1, ty1); ctx.lineTo(tx2, ty2);
        // Fork
        const forkLen = 4;
        if (dir.x !== 0) {
          ctx.moveTo(tx2, ty2); ctx.lineTo(tx2 + dir.x * forkLen, ty2 - forkLen);
          ctx.moveTo(tx2, ty2); ctx.lineTo(tx2 + dir.x * forkLen, ty2 + forkLen);
        } else {
          ctx.moveTo(tx2, ty2); ctx.lineTo(tx2 - forkLen, ty2 + dir.y * forkLen);
          ctx.moveTo(tx2, ty2); ctx.lineTo(tx2 + forkLen, ty2 + dir.y * forkLen);
        }
        ctx.stroke();
      }
    }

    // Scale pattern on body
    if (!isHead && i % 2 === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(px + CELL * 0.5, py + CELL * 0.5, CELL * 0.25, CELL * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawParticles() {
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); return; }

    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── GAME LOOP ──
let lastTs = 0;
function loop(ts) {
  animId = requestAnimationFrame(loop);
  const dt = ts - lastTs;
  lastTs = ts;

  if (gameRunning) {
    accumulator += dt;
    while (accumulator >= TICK_INTERVAL) {
      step();
      accumulator -= TICK_INTERVAL;
    }
  }

  draw(ts);
}

// ── INPUT ──
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = {x:0,y:-1}; e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = {x:0,y:1};  e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = {x:-1,y:0}; e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x:1,y:0};  e.preventDefault(); break;
  }
});

// ── JOYSTICK ──
const joyBase = document.getElementById('joystick-base');
const joyKnob = document.getElementById('joystick-knob');
let joyActive = false;
let joyStart = { x: 0, y: 0 };
const JOY_DEADZONE = 12;
const JOY_RANGE = 40;

function getJoyPos(e) {
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX, y: touch.clientY };
}

function updateJoy(pos) {
  const rect = joyBase.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = pos.x - cx;
  let dy = pos.y - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const clampDist = Math.min(dist, JOY_RANGE);
  const angle = Math.atan2(dy, dx);
  const kx = Math.cos(angle) * clampDist;
  const ky = Math.sin(angle) * clampDist;
  joyKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;

  if (dist > JOY_DEADZONE && gameRunning) {
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (absDx > absDy) {
      if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
      else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
    } else {
      if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
      else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
    }
  }
}

function resetJoy() {
  joyKnob.style.transform = 'translate(-50%, -50%)';
  joyKnob.classList.remove('active');
}

joyBase.addEventListener('touchstart', e => {
  joyActive = true;
  joyKnob.classList.add('active');
  updateJoy(getJoyPos(e));
  e.preventDefault();
}, { passive: false });

joyBase.addEventListener('touchmove', e => {
  if (joyActive) updateJoy(getJoyPos(e));
  e.preventDefault();
}, { passive: false });

joyBase.addEventListener('touchend', e => {
  joyActive = false;
  resetJoy();
  e.preventDefault();
}, { passive: false });

// Mouse joystick support
joyBase.addEventListener('mousedown', e => {
  joyActive = true;
  joyKnob.classList.add('active');
  updateJoy(e);
});
document.addEventListener('mousemove', e => { if (joyActive) updateJoy(e); });
document.addEventListener('mouseup', () => { if (joyActive) { joyActive = false; resetJoy(); } });

// ── BUTTONS ──
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').classList.add('hidden');
  initGame();
  requestAnimationFrame(loop);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('death-overlay').classList.add('hidden');
  canvasContainer.classList.remove('shake');
  initGame();
});

// Draw initial idle state
requestAnimationFrame(ts => {
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);
  // Idle grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
  }
});
</script>
