<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pixel Bear Adventure</title>

<style>
:root{
    --bg:#0f0f12;
    --panel:rgba(24,24,28,.96);
    --text:#f4f7fb;
    --muted:#a7afbd;
    --accent:#7c4dff;
    --accent2:#00e5ff;
    --danger:#ff4d4f;
}

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,Helvetica,sans-serif;
}

/* TOP BAR */
#topBar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    display:grid;
    grid-template-columns:60px 1fr 60px;
    align-items:center;
    background:var(--panel);
    z-index:50;
    backdrop-filter:blur(10px);
}

#title{
    text-align:center;
    font-size:16px;
    font-weight:700;
    letter-spacing:1.2px;
}

.btn{
    width:40px;
    height:40px;
    margin:auto;
    border:0;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
}

.btn:active{
    transform:scale(.96);
}

/* GAME AREA */
#gameArea{
    position:fixed;
    top:60px;
    left:0;
    right:0;
    bottom:64px;
    background:#000;
}

#gameFrame{
    width:100%;
    height:100%;
    border:0;
    display:none;
    background:#000;
}

/* OVERLAYS */
.overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

#startScreen{
    background:
    radial-gradient(circle at top, rgba(124,77,255,.18), transparent 45%),
    linear-gradient(180deg, rgba(0,0,0,.96), rgba(10,10,14,.98));
}

#loadingScreen{
    display:none;
    flex-direction:column;
    gap:14px;
    background:rgba(0,0,0,.96);
}

.card{
    width:min(92vw,420px);
    padding:26px;
    border-radius:22px;
    background:rgba(20,20,28,.86);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
}

.card h1{
    margin:0 0 10px;
    font-size:28px;
}

.card p{
    margin:0;
    color:var(--muted);
    line-height:1.5;
    font-size:14px;
}

#startBtn{
    margin-top:18px;
    width:100%;
    padding:14px;
    border:0;
    border-radius:14px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    color:#111;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
}

.spinner{
    width:56px;
    height:56px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,.12);
    border-top-color:var(--accent);
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

#loadingText{
    color:var(--muted);
    font-size:14px;
}

/* BOTTOM */
#bottomBar{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    height:64px;
    background:var(--panel);
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-size:12px;
    padding:0 14px;
}

@media (max-width:480px){
    #title{font-size:15px;}
    .card h1{font-size:24px;}
}
</style>
</head>

<body>

<header id="topBar">
    <button class="btn" onclick="closeGame()">✕</button>
    <div id="title">Pixel Bear Adventure</div>
    <button class="btn" onclick="reloadGame()">↻</button>
</header>

<main id="gameArea">

    <iframe
        id="gameFrame"
        src=""
        allow="fullscreen; autoplay; encrypted-media"
        allowfullscreen="true"
        msallowfullscreen="true"
        mozallowfullscreen="true"
        webkitallowfullscreen="true"
        allowpaymentrequest="false"
        referrerpolicy="unsafe-url"
        sandbox="allow-same-origin allow-forms allow-scripts allow-pointer-lock allow-orientation-lock allow-popups"
        scrolling="no"
    ></iframe>

    <!-- START -->
    <section id="startScreen" class="overlay">
        <div class="card">
            <h1>Pixel Bear Adventure</h1>
            <p>Press Start to begin playing.</p>
            <button id="startBtn" onclick="startGame()">Start</button>
        </div>
    </section>

    <!-- LOADING -->
    <section id="loadingScreen" class="overlay">
        <div class="spinner"></div>
        <div id="loadingText">Loading...</div>
    </section>

</main>

<footer id="bottomBar">
    Arcade Engine Template
</footer>

<script>
const GAME = {
    title: "Construct Game",
    url: "https://games.construct.net/904/latest"
};

const frame = document.getElementById("gameFrame");
const startScreen = document.getElementById("startScreen");
const loadingScreen = document.getElementById("loadingScreen");
const title = document.getElementById("title");

title.textContent = GAME.title;

let started = false;

function startGame(){
    if(started) return;

    started = true;
    startScreen.style.display = "none";
    loadingScreen.style.display = "flex";

    frame.src = GAME.url;
    frame.style.display = "block";
}

frame.addEventListener("load", () => {
    loadingScreen.style.display = "none";
});

function reloadGame(){
    location.reload();
}

function closeGame(){
    window.location.href = "https://arcadeowl.vercel.app/";
}
</script>

</body>
      </html>
