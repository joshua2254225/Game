<!DOCTYPE html>
<html>
<head>
    <title>3D Farming Simulator</title>
    <style>
        #game-container {
            width: 800px;
            height: 600px;
            perspective: 800px;
            position: relative;
        }
        #world {
            width: 800px;
            height: 600px;
            position: absolute;
            transform-style: preserve-3d;
        }
        #harvester {
            width: 50px;
            height: 50px;
            position: absolute;
            background-color: yellow;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="world">
            <!-- 3D world elements will be dynamically generated here -->
        </div>
        <div id="harvester"></div>
    </div>

    <script>
        const world = document.getElementById('world');

        // Generate a 3D world with cereals
        for (let i = 0; i < 20; i++) {
            const cereal = document.createElement('div');
            cereal.classList.add('cereal');
            cereal.style.width = '20px';
            cereal.style.height = '20px';
            cereal.style.position = 'absolute';
            cereal.style.backgroundColor = 'green';
            cereal.style.top = `${Math.floor(Math.random() * 500)}px`;
            cereal.style.left = `${Math.floor(Math.random() * 750)}px`;

            world.appendChild(cereal);
        }

        // Move the harvester using arrow keys
        const harvester = document.getElementById('harvester');
        let harvesterX = 400;
        let harvesterY = 300;

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowUp') {
                harvesterY -= 10;
            } else if (event.key === 'ArrowDown') {
                harvesterY += 10;
            } else if (event.key === 'ArrowLeft') {
                harvesterX -= 10;
            } else if (event.key === 'ArrowRight') {
                harvesterX += 10;
            }

            harvester.style.transform = `translate3d(${harvesterX}px, ${harvesterY}px, 0)`;
        });
    </script>
</body>
</html>
