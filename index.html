<head>



  
<meta charset="utf-8" />

<title>ArcadeOwl</title>



<style>
:root{
  --blue:#0b74de;
  --muted:#666;
  --card:#ffffff;
  --max-width:980px;
}
html,body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial;
  background:#f5f7fb;
}

/* TOP BAR ZENTRIERT */
.topbar{
  background:var(--blue);
  color:#fff;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:22px;
}

/* WAVE TITLE */
.wave-title span{
  display:inline-block;
  font-weight:900;
  font-size:28px;
  animation:wave 1s infinite;
}
.wave-title span:nth-child(1){animation-delay:0s}
.wave-title span:nth-child(2){animation-delay:.1s}
.wave-title span:nth-child(3){animation-delay:.2s}
.wave-title span:nth-child(4){animation-delay:.3s}
.wave-title span:nth-child(5){animation-delay:.4s}
.wave-title span:nth-child(6){animation-delay:.5s}
.wave-title span:nth-child(7){animation-delay:.6s}
.wave-title span:nth-child(8){animation-delay:.7s}
.wave-title span:nth-child(9){animation-delay:.8s}
@keyframes wave{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* CONTAINER */
.wrap{
  max-width:var(--max-width);
  margin:20px auto;
  padding:12px;
}

/* GAME LIST */
.games-list{
  list-style:none;
  padding:0;
  margin:0;
}
.games-list li{
  background:var(--card);
  margin:12px 0;
  padding:14px 16px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.game-desc{
  font-size:13px;
  color:var(--muted);
}
.play-btn{
  background:var(--blue);
  color:white;
  padding:8px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:700;
}

/* USER BOX & POPUP */
#userBox{
  position:fixed;
  top:10px;
  right:16px;
  background:rgba(255,255,255,.95);
  padding:6px 12px;
  border-radius:8px;
  font-size:13px;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  cursor:pointer;
  z-index:9999;
  display:none;
}
#settingsPopup{
  position:fixed;
  top:40px;
  right:16px;
  background:white;
  padding:10px 12px;
  border-radius:8px;
  box-shadow:0 6px 18px rgba(0,0,0,.2);
  display:none;
  font-size:13px;
  z-index:10000;
}
#settingsPopup input{
  padding:4px 6px;
  border-radius:6px;
  border:1px solid #ccc;
  width:140px;
  font-size:12px;
}

.games-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:14px;
}
@media (min-width: 900px){
  .games-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

/* GAME CARD */
.game-card{
  background:#1e1e1e;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  box-shadow:0 6px 16px rgba(0,0,0,.25);
  transition:transform .15s ease;
}

.game-card:hover{
  transform:scale(1.03);
}

.game-card img{
  width:100%;
  aspect-ratio:1 / 1;
  object-fit:contain;
  background:#000;
  display:block;
}

/* LOGIN BUTTON */
.login-btn{
  position:fixed;
  top:6px;
  right:12px;
  padding:8px 14px;
  border-radius:8px;
  background:#ff9800;
  color:#000;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  z-index:10001;
}

.login-btn:hover{
  background:#ffc107;
}

/* LOCKED GAME */
.game-card.locked{
  position:relative;
  pointer-events:none;
}

.game-card.locked img{
  filter:grayscale(1) brightness(.5);
}

.lock-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.55);
  color:white;
  font-weight:700;
  text-align:center;
  font-size:14px;
  padding:10px;
}

.footer-bar{
  margin-top:40px;
  background:#111;
  color:white;
  padding:16px;
  text-align:center;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:18px;
}

.footer-bar a{
  color:#ccc;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
}

.footer-bar a:hover{
  color:white;
}
</style>
</head>

<div id="userBox">Guest</div>


<div id="grandModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100000; align-items:center; justify-content:center; padding:10px;">
  <div style="background:#1e1e1e; color:white; width:95%; max-width:650px; height:85vh; border-radius:16px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.5);">
    
    <div style="background:#2d2d2d; display:flex; align-items:center; border-bottom:1px solid #3d3d3d; padding:0 10px; height:50px; user-select:none;">
      <button id="closeGrandModalBtn" style="background:none; border:none; color:#aaa; font-size:24px; cursor:pointer; padding:5px 15px; margin-right:10px;">&times;</button>
      
      <div id="tabSettings" style="padding:13px 20px; font-weight:bold; cursor:pointer; border-bottom:3px solid #0b74de; color:white; transition: 0.2s;">Settings</div>
      <div id="tabLeaderboard" style="padding:13px 20px; font-weight:bold; cursor:pointer; border-bottom:3px solid transparent; color:#aaa; display:none; transition: 0.2s;">Leaderboard</div>
    </div>

    <div style="flex:1; overflow-y:auto; padding:20px;">
      
      <div id="panelSettings" style="display:block;">
        
        <div style="margin-bottom:25px; background:#252525; padding:15px; border-radius:12px;">
          <h3 style="margin-top:0; color:#0b74de; font-size:16px; border-bottom:1px solid #333; padding-bottom:5px;">• Account</h3>
          
          <div style="margin-bottom:20px;">
            <label style="font-size:13px; color:#ccc;">Edit Username:</label><br>
            <input type="text" id="usernameInput" placeholder="New username" style="padding:8px 10px; border-radius:6px; border:1px solid #444; background:#333; color:white; width:160px; font-size:13px; margin-top:5px;">
            <button id="saveUsernameBtn" style="background:#0b74de; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-weight:bold; margin-left:5px;">Save</button>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="switchAccountBtn" style="background:#444; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:bold; cursor:pointer;">Switch Account</button>
            <button id="logoutBtn" style="background:#555; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:bold; cursor:pointer;">Logout</button>
            <button id="deleteAccountBtn" style="background:#ff006e; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:bold; cursor:pointer;">Delete Account</button>
          </div>
        </div>

        <div style="margin-bottom:25px; background:#252525; padding:15px; border-radius:12px;">
          <h3 style="margin-top:0; color:#0b74de; font-size:16px; border-bottom:1px solid #333; padding-bottom:5px;">• Site Personalisation</h3>
          
          <label style="display:flex; align-items:center; margin-bottom:15px; cursor:pointer; font-size:14px;">
            <input type="checkbox" id="systemDefaultToggle" checked style="margin-right:10px; transform:scale(1.2);"> System Default
          </label>
          
          <div id="themeRadioGroup" style="padding-left:25px; display:flex; flex-direction:column; gap:10px; opacity:0.5; transition:opacity 0.2s;">
            <label style="display:flex; align-items:center; cursor:pointer; font-size:14px;">
              <input type="radio" name="themeGroup" id="darkModeRadio" disabled style="margin-right:10px; transform:scale(1.2);"> Dark Mode
            </label>
            <label style="display:flex; align-items:center; cursor:pointer; font-size:14px;">
              <input type="radio" name="themeGroup" id="lightModeRadio" disabled style="margin-right:10px; transform:scale(1.2);"> Light Mode
            </label>
          </div>
        </div>

        <div id="leaderboardToggleSection" style="background:#252525; padding:15px; border-radius:12px; opacity:0.5; transition:opacity 0.2s;">
          <h3 style="margin-top:0; color:#0b74de; font-size:16px; border-bottom:1px solid #333; padding-bottom:5px;">• Leaderboard</h3>
          <label style="display:flex; align-items:center; cursor:pointer; font-size:14px;">
            <input type="checkbox" id="leaderboardToggle" disabled style="margin-right:10px; transform:scale(1.2);"> OFF | ON
          </label>
          <p id="leaderboardNotice" style="font-size:11px; color:#888; margin:6px 0 0 0;">(Only available for logged-in users)</p>
        </div>

      </div>

        <iframe id="grandLeaderboardIframe" src="" style="width:100%; height:70vh; border:none; background:#1e1e1e; border-radius:8px;"></iframe>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  updateProfile,
  signOut
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2tHsWgZjPuGXdD90THTbwA_mRLt4D8Q8",
  authDomain: "arcadeowl.firebaseapp.com",
  projectId: "arcadeowl",
  appId: "1:604579422254:web:19ecace88992c998efffbf"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// DOM ELEMENTE RECOGNITION
const userBox = document.getElementById("userBox");
const loginBtn = document.getElementById("loginBtn");
const grandModal = document.getElementById("grandModal");
const closeGrandModalBtn = document.getElementById("closeGrandModalBtn");
const tabSettings = document.getElementById("tabSettings");
const tabLeaderboard = document.getElementById("tabLeaderboard");
const panelSettings = document.getElementById("panelSettings");
const panelLeaderboard = document.getElementById("panelLeaderboard");
const grandLeaderboardIframe = document.getElementById("grandLeaderboardIframe");

// EINSTELLUNGEN ELEMENTE
const systemDefaultToggle = document.getElementById("systemDefaultToggle");
const themeRadioGroup = document.getElementById("themeRadioGroup");
const darkModeRadio = document.getElementById("darkModeRadio");
const lightModeRadio = document.getElementById("lightModeRadio");
const leaderboardToggle = document.getElementById("leaderboardToggle");
const leaderboardToggleSection = document.getElementById("leaderboardToggleSection");
const leaderboardNotice = document.getElementById("leaderboardNotice");

// 1. ZENTRALE AUTH-STEUERUNG (Firebase Status-Check)
onAuthStateChanged(auth, user => {
  const minecraftCard = document.getElementById("minecraftCard");
  
  if (user) {
    const name = user.displayName || user.email.split("@")[0] || "User";
    userBox.textContent = name;
    loginBtn.style.display = "none";
    userBox.style.display = "block";

    // Minecraft Kachel freischalten
    if (minecraftCard) {
      minecraftCard.outerHTML = `
        <a href="minecraft.html" class="game-card">
          <img src="images/Blockbuilder.jpg" alt="MINECRAFT">
        </a>
      `;
    }

    // Leaderboard Optionen aktivieren
    leaderboardToggle.disabled = false;
    leaderboardToggleSection.style.opacity = "1";
    leaderboardNotice.style.display = "none";
  } else {
    // Gast Modus
    userBox.textContent = "Guest";
    userBox.style.display = "none";
    loginBtn.style.display = "block";

    // Leaderboard Optionen sperren & Reiter ausblenden
    leaderboardToggle.checked = false;
    leaderboardToggle.disabled = true;
    leaderboardToggleSection.style.opacity = "0.5";
    leaderboardNotice.style.display = "block";
    tabLeaderboard.style.display = "none";
    switchTab("settings");
  }
});

// 2. OPEN & CLOSE MODAL LOGIK
userBox.addEventListener("click", e => {
  e.stopPropagation();
  grandModal.style.display = "flex";
});

const closeGrandModal = () => {
  grandModal.style.display = "none";
  grandLeaderboardIframe.src = "";
  switchTab("settings"); 
};
closeGrandModalBtn.onclick = closeGrandModal;
grandModal.onclick = (e) => { if (e.target === grandModal) closeGrandModal(); };

// 3. TAB-WECHSEL STEUERUNG
const switchTab = (tab) => {
  if (tab === "settings") {
    panelSettings.style.display = "block";
    panelLeaderboard.style.display = "none";
    grandLeaderboardIframe.src = ""; 
    tabSettings.style.borderBottomColor = "#0b74de";
    tabSettings.style.color = "white";
    tabLeaderboard.style.borderBottomColor = "transparent";
    tabLeaderboard.style.color = "#aaa";
  } else if (tab === "leaderboard") {
    panelSettings.style.display = "none";
    panelLeaderboard.style.display = "block";
    
    // Iframe Inhalt erst beim Klick anfordern
    if (!grandLeaderboardIframe.src.includes("leaderboard.html")) {
      grandLeaderboardIframe.src = "leaderboard.html";
    }
    tabLeaderboard.style.borderBottomColor = "#0b74de";
    tabLeaderboard.style.color = "white";
    tabSettings.style.borderBottomColor = "transparent";
    tabSettings.style.color = "#aaa";
  }
};
tabSettings.onclick = () => switchTab("settings");
tabLeaderboard.onclick = () => switchTab("leaderboard");

// 4. PERSONALISIERUNG (System Default Logik)
systemDefaultToggle.onchange = () => {
  const isDefault = systemDefaultToggle.checked;
  darkModeRadio.disabled = isDefault;
  lightModeRadio.disabled = isDefault;
  themeRadioGroup.style.opacity = isDefault ? "0.5" : "1";
  if (isDefault) {
    darkModeRadio.checked = false;
    lightModeRadio.checked = false;
  }
};

// 5. LEADERBOARD TOGGLE (Schalter blendet Reiter ein/aus)
leaderboardToggle.onchange = () => {
  if (leaderboardToggle.checked) {
    tabLeaderboard.style.display = "block";
  } else {
    tabLeaderboard.style.display = "none";
    switchTab("settings");
  }
};

// 6. ACCOUNT OPTIONEN (Aktionen)
document.getElementById("saveUsernameBtn").onclick = () => {
  const newName = document.getElementById("usernameInput").value.trim();
  if (newName && auth.currentUser) {
    updateProfile(auth.currentUser, { displayName: newName }).then(() => {
      userBox.textContent = newName;
      alert("Username updated successfully!");
    }).catch(err => alert(err.message));
  }
};

document.getElementById("switchAccountBtn").onclick = () => {
  window.location.href = "login.html";
};

document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => location.reload());

document.getElementById("deleteAccountBtn").onclick = () => {
  if (auth.currentUser) {
    if (confirm("⚠️ Are you sure you want to permanently DELETE your account? This cannot be undone!")) {
      auth.currentUser.delete()
        .then(() => location.reload())
        .catch(err => alert("Error: Please log in again before trying to delete your account.\n" + err.message));
    }
  } else {
    alert("You are not logged in!");
  }
};
</script>
