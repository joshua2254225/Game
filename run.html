<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Subway Surfer Clone</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:Arial,sans-serif;
}
canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}
.ui{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    z-index:10;
}
.hidden{display:none;}

.title{
    font-size:48px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 0 15px #00ffff;
}

.btn{
    padding:16px 40px;
    border:none;
    border-radius:15px;
    font-size:22px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:5;
    font-weight:bold;
    font-size:18px;
    text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud" class="hidden">
    Score: <span id="score">0</span><br>
    High Score: <span id="high">0</span>
</div>

<div id="menu" class="ui">
    <div class="title">SUBWAY RUNNER</div>
    <button class="btn" id="playBtn">PLAY</button>
</div>

<div id="gameOver" class="ui hidden">
    <div class="title">GAME OVER</div>
    <div id="finalScore" style="font-size:24px;margin-bottom:20px"></div>
    <button class="btn" id="restartBtn">RESTART</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

const menu = document.getElementById("menu");
const gameOverScreen = document.getElementById("gameOver");
const playBtn = document.getElementById("playBtn");
const restartBtn = document.getElementById("restartBtn");
const hud = document.getElementById("hud");
const scoreEl = document.getElementById("score");
const highEl = document.getElementById("high");
const finalScore = document.getElementById("finalScore");

let highScore = Number(localStorage.getItem("subway_high")) || 0;
highEl.textContent = highScore;

const LANES = [-1,0,1];

let gameState = "menu";

let player;
let obstacles;
let coins;
let score;
let speed;
let spawnTimer;
let coinTimer;

function resetGame(){

    player = {
        lane:1,
        targetLane:1,
        x:0,
        jump:0,
        jumpVel:0,
        duck:false,
        duckTimer:0
    };

    obstacles = [];
    coins = [];

    score = 0;
    speed = 0.85;

    spawnTimer = 0;
    coinTimer = 0;
}

function startGame(){
    resetGame();
    gameState = "playing";

    menu.classList.add("hidden");
    gameOverScreen.classList.add("hidden");
    hud.classList.remove("hidden");
}

function endGame(){

    gameState = "gameover";

    if(score > highScore){
        highScore = Math.floor(score);
        localStorage.setItem("subway_high",highScore);
    }

    highEl.textContent = highScore;
    finalScore.textContent = "Score: " + Math.floor(score);

    gameOverScreen.classList.remove("hidden");
}

playBtn.onclick = startGame;
restartBtn.onclick = startGame;

function laneToX(lane){
    const roadWidth = canvas.width*0.65;
    const center = canvas.width/2;

    return center + LANES[lane]*(roadWidth*0.18);
}

function project(x,z){

    const horizon = canvas.height*0.18;
    const scale = 1/(z*0.015+0.35);

    return {
        x: canvas.width/2 + x*scale,
        y: horizon + (1-scale)*canvas.height*1.05,
        scale
    };
}

function spawnObstacle(){

    const types = ["wall","barrier","train"];

    obstacles.push({
        lane: Math.floor(Math.random()*3),
        z: 100,
        type: types[Math.floor(Math.random()*types.length)]
    });
}

function spawnCoin(){

    coins.push({
        lane: Math.floor(Math.random()*3),
        z: 100
    });
}

let touchStartX=0;
let touchStartY=0;

canvas.addEventListener("touchstart",e=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchend",e=>{

    if(gameState!=="playing") return;

    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;

    if(Math.abs(dx)>Math.abs(dy)){

        if(dx>40){
            player.targetLane = Math.min(2,player.targetLane+1);
        }
        else if(dx<-40){
            player.targetLane = Math.max(0,player.targetLane-1);
        }
    }else{

        if(dy<-40){

            if(player.jump===0){
                player.jumpVel = 1.7;
            }

        }else if(dy>40){

            player.duck = true;
            player.duckTimer = 0.45;
        }
    }
},{passive:false});

function update(dt){

    score += dt*10;
    scoreEl.textContent = Math.floor(score);

    speed += dt*0.02;

    player.x += ((player.targetLane-player.lane)*100-player.x)*dt*12;

    if(Math.abs(player.x)<1){
        player.lane = player.targetLane;
        player.x = 0;
    }

    if(player.jumpVel!==0 || player.jump>0){

        player.jump += player.jumpVel;
        player.jumpVel -= dt*5;

        if(player.jump<0){
            player.jump = 0;
            player.jumpVel = 0;
        }
    }

    if(player.duck){

        player.duckTimer -= dt;

        if(player.duckTimer<=0){
            player.duck=false;
        }
    }

    spawnTimer += dt;
    coinTimer += dt;

    if(spawnTimer > Math.max(0.35,1.0-speed*0.3)){
        spawnTimer = 0;
        spawnObstacle();
    }

    if(coinTimer > 0.45){
        coinTimer = 0;
        spawnCoin();
    }

    for(let i=obstacles.length-1;i>=0;i--){

        const o = obstacles[i];
        o.z -= speed*dt*45;

        if(o.z<0){
            obstacles.splice(i,1);
            continue;
        }

        if(o.z<6 && o.lane===player.targetLane){

            if(o.type==="wall"){
                endGame();
            }

            else if(o.type==="barrier"){

                if(!player.duck){
                    endGame();
                }
            }

            else if(o.type==="train"){

                if(player.jump<18){
                    endGame();
                }
            }
        }
    }

    for(let i=coins.length-1;i>=0;i--){

        const c = coins[i];
        c.z -= speed*dt*45;

        if(c.z<0){
            coins.splice(i,1);
            continue;
        }

        if(c.z<6 && c.lane===player.targetLane){
            score += 25;
            coins.splice(i,1);
        }
    }
}

function drawRoad(){

    const w = canvas.width;
    const h = canvas.height;

    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,"#5ec8ff");
    g.addColorStop(1,"#d9f6ff");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,w,h);

    const horizon = h*0.18;

    ctx.fillStyle="#3d3d3d";

    ctx.beginPath();
    ctx.moveTo(w*0.25,h);
    ctx.lineTo(w*0.75,h);
    ctx.lineTo(w*0.58,horizon);
    ctx.lineTo(w*0.42,horizon);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="#eeeeee";
    ctx.lineWidth=3;

    for(let i=1;i<=2;i++){

        const xb = w*0.25 + (w*0.5)*(i/3);
        const xt = w*0.42 + (w*0.16)*(i/3);

        ctx.beginPath();
        ctx.moveTo(xb,h);
        ctx.lineTo(xt,horizon);
        ctx.stroke();
    }

    for(let z=5;z<100;z+=5){

        const p = project(0,z);

        ctx.strokeStyle="rgba(255,255,255,0.15)";
        ctx.beginPath();
        ctx.moveTo(w*0.25,p.y);
        ctx.lineTo(w*0.75,p.y);
        ctx.stroke();
    }
}

function drawObstacle(o){

    const laneX = (LANES[o.lane])*180;
    const p = project(laneX,o.z);

    const s = p.scale*110;

    if(o.type==="wall"){
        ctx.fillStyle="#ff4444";
        ctx.fillRect(p.x-s/2,p.y-s,s,s);
    }

    if(o.type==="barrier"){
        ctx.fillStyle="#ffcc00";
        ctx.fillRect(p.x-s/2,p.y-s*0.4,s,s*0.4);
    }

    if(o.type==="train"){
        ctx.fillStyle="#00aa55";
        ctx.fillRect(p.x-s/2,p.y-s*1.2,s,s*1.2);
    }
}

function drawCoin(c){

    const laneX = (LANES[c.lane])*180;
    const p = project(laneX,c.z);

    const r = p.scale*18;

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(p.x,p.y-r,r,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#fff6a0";
    ctx.lineWidth=2;
    ctx.stroke();
}

function drawPlayer(){

    const baseX = laneToX(player.targetLane)+player.x;

    const y = canvas.height*0.82-player.jump*8;

    const h = player.duck ? 45 : 70;
    const w = 38;

    ctx.fillStyle="#00d4ff";

    ctx.fillRect(baseX-w/2,y-h,w,h);

    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(baseX,y-h-12,14,0,Math.PI*2);
    ctx.fill();
}

function draw(){

    drawRoad();

    obstacles.sort((a,b)=>b.z-a.z);

    for(const o of obstacles) drawObstacle(o);
    for(const c of coins) drawCoin(c);

    drawPlayer();
}

let last = 0;

function loop(t){

    requestAnimationFrame(loop);

    const dt = Math.min((t-last)/1000,0.03);
    last = t;

    if(gameState==="playing"){
        update(dt);
    }

    draw();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
