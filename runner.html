<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon City Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Arial Black', Impact, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- UI Overlay & Layout --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* --- Screens (Start / Game Over) --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.85), rgba(40, 10, 50, 0.95));
            padding: 40px;
            border-radius: 24px;
            border: 4px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.2);
            pointer-events: auto;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #fff;
            font-size: 42px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px #ff007f, -3px -3px 0px #00f0ff;
        }

        p { 
            color: #e0e0ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px; 
            margin-bottom: 30px; 
            line-height: 1.6;
            font-weight: 600;
            text-shadow: 1px 1px 2px #000;
        }
        
        .score-text { 
            color: #ffcc00; 
            font-size: 28px; 
            margin: 15px 0; 
            text-shadow: 0 0 10px #ffcc00;
        }

        /* --- Buttons --- */
        button {
            background: linear-gradient(to bottom, #00f0ff, #0088ff);
            color: #fff;
            border: none;
            padding: 16px 45px;
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #0055aa, 0 10px 20px rgba(0, 240, 255, 0.5);
            transition: all 0.1s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 6px 0 #0055aa, 0 0 15px rgba(0, 240, 255, 0.4); }
            50% { box-shadow: 0 6px 0 #0055aa, 0 0 30px rgba(0, 240, 255, 0.8); }
            100% { box-shadow: 0 6px 0 #0055aa, 0 0 15px rgba(0, 240, 255, 0.4); }
        }

        button:active { 
            transform: translateY(6px); 
            box-shadow: 0 0 0 #0055aa, 0 5px 10px rgba(0, 240, 255, 0.5); 
        }

        /* --- HUD (Heads Up Display) --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .hud-panel {
            background: rgba(10, 5, 20, 0.6);
            border: 2px solid #ff007f;
            color: #fff;
            font-size: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            text-shadow: 1px 1px 2px #000;
        }

        .coin-icon { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud" style="display: none;">
        <div id="scoreDisplay" class="hud-panel"><span class="coin-icon">★</span> 0</div>
        <div id="highScoreDisplay" class="hud-panel">BEST: 0</div>
    </div>

    <div id="ui-layer">
        <div id="startScreen" class="screen" style="display: flex;">
            <h1>Neon Runner</h1>
            <p>Swipe <b>Left/Right</b> to switch lanes<br>Swipe <b>Up</b> to Jump<br>Swipe <b>Down</b> to Duck</p>
            <button id="startBtn">Tap to Play</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h1>Wasted</h1>
            <div id="finalScore" class="score-text"><span class="coin-icon">★</span> 0</div>
            <p>You smashed into an obstacle!</p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        // --- Setup & Config ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Pseudo-3D Camera constants
        const FOCAL_LENGTH = 300;
        let CAM_HEIGHT = 150;
        let VP_Y = 0; // Horizon Y position
        const LANE_WIDTH = 220;
        const MAX_DEPTH = 2000;

        // Game State
        let state = 'START';
        let score = 0;
        let highScore = localStorage.getItem('neonRunnerHighScore') || 0;
        let distanceTraveled = 0;
        let baseSpeed = 16;
        let currentSpeed = 0;
        let frameCount = 0;

        highScoreDisplay.innerText = `BEST: ${Math.floor(highScore)}`;

        // Player Object
        const player = {
            lane: 0,
            visualLane: 0,
            z: 20,
            y: 0,
            vy: 0,
            gravity: -2.8,
            jumpPower: 38,
            isDucking: false,
            duckTimer: 0,
            width: 80,
            height: 120,
            color: '#00f0ff'
        };

        // Entities arrays
        let entities = [];

        // Skyline Data (Pre-generated for performance)
        let skyline = [];

        // --- Window Resizing ---
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            VP_Y = height * 0.40; // Horizon slightly lower for better sky view
            generateSkyline();
        }
        window.addEventListener('resize', resize);

        function generateSkyline() {
            skyline = [];
            let currentX = 0;
            while (currentX < width) {
                let w = 30 + Math.random() * 50;
                let h = 20 + Math.random() * 120;
                skyline.push({ x: currentX, w: w, h: h });
                currentX += w + Math.random() * 10;
            }
        }

        resize();

        // --- Swipe Input Handling ---
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            if (state !== 'PLAYING') return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchmove', e => {
            if (state === 'PLAYING') e.preventDefault(); 
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (state !== 'PLAYING') return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});

        document.addEventListener('keydown', e => {
            if (state !== 'PLAYING') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1);
            if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1);
            if (e.key === 'ArrowUp' || e.key === 'w') jump();
            if (e.key === 'ArrowDown' || e.key === 's') duck();
        });

        function handleSwipe(startX, startY, endX, endY) {
            let dx = endX - startX;
            let dy = endY - startY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) movePlayer(1);
                    else movePlayer(-1);
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy < 0) jump();
                    else duck();
                }
            }
        }

        // --- Player Actions ---
        function movePlayer(dir) {
            player.lane += dir;
            if (player.lane < -1) player.lane = -1;
            if (player.lane > 1) player.lane = 1;
        }

        function jump() {
            if (player.y <= 0 && !player.isDucking) {
                player.vy = player.jumpPower;
            }
        }

        function duck() {
            if (player.y <= 0) {
                player.isDucking = true;
                player.duckTimer = 40; 
            } else {
                player.vy -= 20; 
            }
        }

        // --- Game Logic ---
        function startGame() {
            state = 'PLAYING';
            score = 0;
            distanceTraveled = 0;
            currentSpeed = baseSpeed;
            frameCount = 0;
            player.lane = 0;
            player.visualLane = 0;
            player.y = 0;
            player.vy = 0;
            player.isDucking = false;
            entities = [];
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            hud.style.display = 'flex';
            updateScoreUI();
            
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            state = 'GAMEOVER';
            hud.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            finalScore.innerHTML = `<span class="coin-icon">★</span> ${Math.floor(score)}`;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonRunnerHighScore', highScore);
                highScoreDisplay.innerText = `BEST: ${Math.floor(highScore)}`;
            }
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // --- Spawning Entities ---
        function spawnEntities() {
            let spawnInterval = Math.max(15, 55 - Math.floor(currentSpeed));
            
            if (frameCount % spawnInterval === 0) {
                let randomLane = Math.floor(Math.random() * 3) - 1; 
                let r = Math.random();

                if (r < 0.25) {
                    let coinCount = Math.floor(Math.random() * 4) + 3;
                    for (let i = 0; i < coinCount; i++) {
                        entities.push({
                            type: 'coin', lane: randomLane, z: MAX_DEPTH + i * 150,
                            w: 40, h: 40, y: 30, collected: false
                        });
                    }
                } else if (r < 0.5) {
                    entities.push({
                        type: 'train', lane: randomLane, z: MAX_DEPTH,
                        w: 160, h: 220, y: 0, color: '#ff007f'
                    });
                } else if (r < 0.75) {
                    entities.push({
                        type: 'barrier', lane: randomLane, z: MAX_DEPTH,
                        w: 160, h: 65, y: 0, color: '#ffcc00'
                    });
                } else {
                    entities.push({
                        type: 'overhead', lane: randomLane, z: MAX_DEPTH,
                        w: 200, h: 50, y: 140, color: '#b000ff'
                    });
                }
            }
        }

        // --- Projection Math ---
        function project(lane, y3d, z3d) {
            let scale = FOCAL_LENGTH / (FOCAL_LENGTH + z3d);
            let screenX = width / 2 + (lane * LANE_WIDTH) * scale;
            let screenY = VP_Y + CAM_HEIGHT * scale - y3d * scale;
            return { x: screenX, y: screenY, scale: scale };
        }

        // --- Update Loop ---
        function update() {
            frameCount++;
            distanceTraveled += currentSpeed;
            score += currentSpeed * 0.05;
            currentSpeed = baseSpeed + (distanceTraveled * 0.00015); 

            updateScoreUI();

            player.visualLane += (player.lane - player.visualLane) * 0.25; 
            
            player.y += player.vy;
            player.vy += player.gravity;
            if (player.y <= 0) {
                player.y = 0;
                player.vy = 0;
            }

            if (player.isDucking) {
                player.duckTimer--;
                if (player.duckTimer <= 0) player.isDucking = false;
            }

            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.z -= currentSpeed;

                if (e.z > 0 && e.z < 60 && Math.abs(e.lane - player.lane) < 0.5) {
                    if (e.type === 'coin' && !e.collected) {
                        e.collected = true;
                        score += 50;
                    } else if (!e.collected) {
                        if (e.type === 'train') {
                            gameOver();
                        } else if (e.type === 'barrier') {
                            if (player.y < e.h - 15) gameOver(); 
                        } else if (e.type === 'overhead') {
                            if (!player.isDucking) gameOver(); 
                        }
                    }
                }

                if (e.z < -100) entities.splice(i, 1);
            }

            spawnEntities();
        }

        function updateScoreUI() {
            if(frameCount % 5 === 0) {
                scoreDisplay.innerHTML = `<span class="coin-icon">★</span> ${Math.floor(score)}`;
            }
        }

        // --- Render Loop ---
        function draw() {
            // 1. Draw Sky Background
            let skyGrad = ctx.createLinearGradient(0, 0, 0, VP_Y);
            skyGrad.addColorStop(0, '#0f0c29');   // Deep Space
            skyGrad.addColorStop(0.5, '#302b63'); // Purple
            skyGrad.addColorStop(1, '#ff007f');   // Neon Pink horizon
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, width, VP_Y);

            // 2. Draw Sun
            ctx.fillStyle = '#ffea00';
            ctx.shadowColor = '#ffea00';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(width/2, VP_Y, 80, Math.PI, 0); // Half circle resting on horizon
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow

            // 3. Draw Skyline
            ctx.fillStyle = '#050510'; // Silhouette color
            for (let b of skyline) {
                ctx.fillRect(b.x, VP_Y - b.h, b.w, b.h);
                // Glowing windows
                ctx.fillStyle = 'rgba(0, 240, 255, 0.2)';
                if(b.h > 50) ctx.fillRect(b.x + 5, VP_Y - b.h + 10, b.w - 10, b.h - 20);
                ctx.fillStyle = '#050510';
            }

            // 4. Draw Ground / Grid
            ctx.fillStyle = '#110022';
            ctx.fillRect(0, VP_Y, width, height - VP_Y);

            // Speed Grid lines
            ctx.strokeStyle = '#ff007f';
            ctx.lineWidth = 1;
            let offset = (distanceTraveled % 200);
            for (let i = 0; i < 20; i++) {
                let z = i * 200 - offset;
                if (z > 0 && z < MAX_DEPTH) {
                    let p1 = project(-3, 0, z);
                    let p2 = project(3, 0, z);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }

            // Lane Dividers
            for (let l = -1; l <= 1; l++) {
                let pBottom = project(l, 0, 0);
                let pTop = project(l, 0, MAX_DEPTH);
                
                // Outer boundaries and middle dividers
                ctx.strokeStyle = (l === 0) ? 'rgba(0, 240, 255, 0.8)' : 'rgba(255, 0, 127, 0.5)';
                ctx.lineWidth = 6 * pBottom.scale;
                
                // Draw dashed lines for dividers
                ctx.setLineDash([20, 20]);
                ctx.lineDashOffset = -distanceTraveled;
                
                ctx.beginPath();
                ctx.moveTo(pBottom.x, pBottom.y);
                ctx.lineTo(pTop.x, pTop.y);
                ctx.stroke();
                
                ctx.setLineDash([]); // Reset line dash
            }

            // Sort entities from back to front (Painter's Algorithm)
            let renderList = [...entities];
            renderList.push({ isPlayer: true, z: player.z });
            renderList.sort((a, b) => b.z - a.z);

            // Draw Entities
            for (let e of renderList) {
                if (e.z < 0) continue; 
                if (e.isPlayer) drawPlayer();
                else if (!e.collected) drawEntity(e);
            }
        }

        function drawEntity(e) {
            let p = project(e.lane, e.y, e.z);
            let s = p.scale;
            let dw = e.w * s;
            let dh = e.h * s;

            if (e.type === 'coin') {
                // Rotation effect
                let rot = Math.sin(frameCount * 0.1 + e.z) * (dw/2);
                
                ctx.fillStyle = '#ffea00';
                ctx.beginPath();
                ctx.ellipse(p.x, p.y - dh/2, Math.max(1, Math.abs(rot)), dh/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ff9900';
                ctx.lineWidth = 2 * s;
                ctx.stroke();
            } else {
                let faceHeight = dh;
                
                // Front Face
                ctx.fillStyle = e.color;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 10 * s; // Neon glow effect
                ctx.fillRect(p.x - dw/2, p.y - faceHeight, dw, faceHeight);
                ctx.shadowBlur = 0;
                
                // Dark border
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x - dw/2, p.y - faceHeight, dw, faceHeight);

                // Obstacle Details
                if (e.type === 'train') {
                    ctx.fillStyle = '#111';
                    ctx.fillRect(p.x - dw*0.4, p.y - faceHeight*0.8, dw*0.8, faceHeight*0.3); // Window
                    ctx.fillStyle = '#00f0ff'; // Bright headlights
                    ctx.fillRect(p.x - dw*0.3, p.y - faceHeight*0.2, dw*0.2, faceHeight*0.1);
                    ctx.fillRect(p.x + dw*0.1, p.y - faceHeight*0.2, dw*0.2, faceHeight*0.1);
                } else if (e.type === 'barrier') {
                    ctx.fillStyle = '#111';
                    for(let i=0; i<4; i++) {
                        ctx.fillRect(p.x - dw/2 + i*(dw/4), p.y - faceHeight, dw/8, faceHeight);
                    }
                } else if (e.type === 'overhead') {
                    // Pillars for overhead
                    ctx.fillStyle = '#555';
                    ctx.fillRect(p.x - dw/2, p.y, dw*0.15, e.y * s);
                    ctx.fillRect(p.x + dw*0.35, p.y, dw*0.15, e.y * s);
                }
            }
        }

        function drawPlayer() {
            let p = project(player.visualLane, player.y, player.z);
            let s = p.scale;
            
            let ph = player.isDucking ? (player.height * 0.5) : player.height;
            let pw = player.width;
            
            let dw = pw * s;
            let dh = ph * s;
            
            // Player Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.beginPath();
            ctx.ellipse(project(player.visualLane, 0, player.z).x, project(player.visualLane, 0, player.z).y, dw*0.7, dw*0.2, 0, 0, Math.PI*2);
            ctx.fill();

            // Player Body
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15 * s; // Glowing player
            let rx = p.x - dw/2;
            let ry = p.y - dh;
            
            ctx.beginPath();
            ctx.roundRect(rx, ry, dw, dh, 12 * s);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Helmet/Visor
            ctx.fillStyle = '#ff007f';
            ctx.beginPath();
            ctx.arc(p.x, ry + dh*0.2, dw*0.4, 0, Math.PI*2);
            ctx.fill();
            
            // Visor reflection
            ctx.fillStyle = '#fff';
            ctx.fillRect(p.x + dw*0.1, ry + dh*0.1, dw*0.2, dh*0.1);

            if(!player.isDucking) {
                // Jetpack / Backpack
                ctx.fillStyle = '#222';
                ctx.fillRect(rx + dw*0.1, ry + dh*0.4, dw*0.8, dh*0.5);
                
                // Thruster exhaust (if jumping)
                if(player.y > 0) {
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.moveTo(rx + dw*0.2, ry + dh*0.9);
                    ctx.lineTo(rx + dw*0.8, ry + dh*0.9);
                    ctx.lineTo(p.x, ry + dh*1.3);
                    ctx.fill();
                }
            }
        }

        // --- Main Game Loop ---
        function gameLoop() {
            if (state === 'PLAYING') {
                update();
            }
            draw();
            
            if (state === 'PLAYING') {
                requestAnimationFrame(gameLoop);
            }
        }

        // Initial render frame behind start screen
        draw();

    </script>
</body>
</html>
